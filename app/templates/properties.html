{% extends "base.html" %}



{% block main %}

<h1>Properties</h1>

    
<ul class="property-grid" style="list-style: none; padding: 0;">
    
    {% for property in properties %}

    <li>
        <!-- Property Image -->
        <img src="{{ url_for('get_property', filename=photo) }}" width="200" alt="Property Image">

        <!-- Property Details -->
        <!--Font awesome was used because Bootstrap was limited in icon variety-->
        <p>${{ "{:,}".format(property.price) }}</p>
        <p>{{ title }}</p>
        <p><i class="fa-solid fa-location-dot"></i>{{ location }}</p> 

        <!-- View Property Button -->
        <a href="{{ url_for('get_property', property_id=property_id) }}" class="btn btn-primary">
            View Property
        </a>
    </li>
  
    {% endfor %}
</ul>





{% endblock %}
